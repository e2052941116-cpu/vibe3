<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字聽力測驗 - 複選單元版</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; background-color: #eef2f3; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        .unit-selector { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .unit-option { margin: 8px 0; display: flex; align-items: center; cursor: pointer; }
        .unit-option input { width: auto; margin-right: 10px; cursor: pointer; }
        input[type="text"], button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        .exit-btn { background-color: #e74c3c; margin-top: 20px; }
        .exit-btn:hover { background-color: #c0392b; }
        .feedback { font-weight: bold; margin: 15px 0; min-height: 24px; border-radius: 5px; padding: 5px; }
        .correct { color: #27ae60; background-color: #e8f5e9; }
        .wrong { color: #c0392b; background-color: #fce4ec; }
        .stats-bar { display: flex; justify-content: space-between; font-size: 0.9em; color: #7f8c8d; margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        .word-info { color: #34495e; font-size: 1.1em; margin-bottom: 10px; font-weight: 500; }
        .result-card { display: none; text-align: left; }
        .result-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .score-big { font-size: 2em; color: #2c3e50; margin: 20px 0; text-align: center; }
        .all-select-btn { background: #95a5a6; font-size: 12px; padding: 5px; width: auto; margin-bottom: 10px; }
        
        #wordListSection { margin-top: 30px; text-align: left; border-top: 2px solid #eee; padding-top: 20px; }
        .unit-group { margin-bottom: 20px; }
        .unit-title { background: #34495e; color: white; padding: 5px 12px; border-radius: 5px; font-size: 14px; margin-bottom: 10px; display: inline-block; }
        .word-row { font-size: 14px; padding: 4px 0; border-bottom: 1px dashed #eee; color: #444; }
        .word-row b { color: #2980b9; }
        .toggle-list-btn { background-color: #9b59b6; margin-top: 10px; }
        .toggle-list-btn:hover { background-color: #8e44ad; }
    </style>
</head>
<body>

<div class="container">
    <div id="setupSection">
        <h2>單字聽寫測驗</h2>
        <p>請勾選練習單元：</p>
        <div class="unit-selector">
            <button class="all-select-btn" onclick="toggleAllUnits(true)">全選</button>
            <button class="all-select-btn" onclick="toggleAllUnits(false)">全不選</button>
            <label class="unit-option"><input type="checkbox" name="unit" value="1"> 第一單元 </label>
            <label class="unit-option"><input type="checkbox" name="unit" value="2"> 第二單元 </label>
            <label class="unit-option"><input type="checkbox" name="unit" value="3"> 第三單元 </label>
            <label class="unit-option"><input type="checkbox" name="unit" value="4"> 第四單元 </label>
            <label class="unit-option"><input type="checkbox" name="unit" value="5"> 第五單元 </label>
            <label class="unit-option"><input type="checkbox" name="unit" value="6"> 第六單元 </label>
            <!-- 新增第七單元選項 -->
            <label class="unit-option"><input type="checkbox" name="unit" value="7"> 第七單元 </label>
        </div>
        <button onclick="startTest()" style="background-color: #2ecc71;">開始測驗</button>
        
        <button class="toggle-list-btn" onclick="toggleWordList()">📖 查看/隱藏所有單字列表</button>
        
        <div id="wordListSection" style="display: none;"></div>
    </div>

    <div id="quizSection" style="display:none;">
        <div class="stats-bar">
            <span id="progress">進度: 0/0</span>
            <span id="scoreDisplay">正確: 0 | 錯誤: 0</span>
        </div>
        <div class="word-info" id="wordType"></div>
        <button onclick="playAudio()" style="background-color: #f1c40f; color: #2c3e50;">🔊 播放發音</button>
        <input type="text" id="userInput" placeholder="請在此輸入單字拼法..." autocomplete="off">
        <div class="feedback" id="feedback"></div>
        <button id="submitBtn" onclick="checkAnswer()">提交答案</button>
        <button class="exit-btn" onclick="endTest()">結束並結算</button>
    </div>

    <div id="resultSection" class="result-card">
        <h2>測驗結算</h2>
        <div class="score-big" id="finalScore"></div>
        <div id="scoreDetails"></div>
        <button onclick="location.reload()" style="margin-top: 20px; background-color: #2ecc71;">重新開始</button>
    </div>
</div>

    { u: 6, w: "boom", t: "(n.) 快速成長" }, { u: 6, w: "breaking news", t: "(n.) 突發新聞" }, { u: 6, w: "briefing", t: "(n.) 簡單介紹" }, { u: 6, w: "broadcast", t: "(v.) 播送" }, { u: 6, w: "celebrity", t: "(n.) 名人" }, { u: 6, w: "circulation", t: "(n.) 發行量" }, { u: 6, w: "current", t: "(adj.) 現今的" }, { u: 6, w: "deliver", t: "(v.) 投遞" }, { u: 6, w: "digital", t: "(adj.) 數位的" }, { u: 6, w: "edition", t: "(n.) 版本" }, { u: 6, w: "entertainment", t: "(n.) 娛樂" }, { u: 6, w: "fake", t: "(adj.) 假的" }, { u: 6, w: "front page", t: "(n.) 頭條" }, { u: 6, w: "gossip", t: "(n.) 八卦" }, { u: 6, w: "issue", t: "(n.) 期刊" }, { u: 6, w: "newsfeed", t: "(n.) 新聞來源" }, { u: 6, w: "notification", t: "(n.) 通知" }, { u: 6, w: "outlet", t: "(n.) 途徑" }, { u: 6, w: "podcast", t: "(n.) 播客" }, { u: 6, w: "politics", t: "(n.) 政治" }, { u: 6, w: "prediction", t: "(n.) 預報" }, { u: 6, w: "pressure", t: "(n.) 壓力" }, { u: 6, w: "professional", t: "(adj.) 職業的" }, { u: 6, w: "protest", t: "(n.) 抗議" }, { u: 6, w: "publish", t: "(v.) 發佈" }, { u: 6, w: "section", t: "(n.) 部分" }, { u: 6, w: "social media", t: "(n.) 社群媒體" }, { u: 6, w: "stock market", t: "(n.) 股市" }, { u: 6, w: "subscription", t: "(n.) 訂閱" }, { u: 6, w: "technology", t: "(n.) 科技" }, { u: 6, w: "trade", t: "(v.) 交易" }, { u: 6, w: "trend", t: "(n.) 趨勢" }, { u: 6, w: "unemployment", t: "(n.) 失業" },
    
    /* 第七單元新單字[cite: 2] */
    { u: 7, w: "adoration", t: "(n.) 崇拜" }, { u: 7, w: "album", t: "(n.) 專輯、相簿" }, { u: 7, w: "autograph", t: "(n.) 親筆簽名" }, { u: 7, w: "commercial", t: "(n.) 廣告" }, { u: 7, w: "contract", t: "(n.) 合約" }, { u: 7, w: "credit", t: "(n.) 名聲" }, { u: 7, w: "critics", t: "(n.) 評論家" }, { u: 7, w: "disadvantage", t: "(n.) 缺點" }, { u: 7, w: "earnings", t: "(n.) 收入" }, { u: 7, w: "exaggerate", t: "(v.) 誇大" }, { u: 7, w: "fame", t: "(n.) 名聲" }, { u: 7, w: "go viral", t: "(phr.) 爆紅" }, { u: 7, w: "hassle", t: "(n.) 麻煩" }, { u: 7, w: "idolize", t: "(v.) 崇拜" }, { u: 7, w: "indifference", t: "(n.) 冷漠" }, { u: 7, w: "look up to", t: "(phr.) 仰慕" }, { u: 7, w: "lyrics", t: "(n.) 歌詞" }, { u: 7, w: "motivational", t: "(adj.) 激勵的" }, { u: 7, w: "obsessed", t: "(adj.) 著迷的" }, { u: 7, w: "paparazzi", t: "(n.) 狗仔隊" }, { u: 7, w: "perks", t: "(n.) 福利" }, { u: 7, w: "pessimistic", t: "(adj.) 悲觀的" }, { u: 7, w: "positive", t: "(adj.) 正面的" }, { u: 7, w: "posting", t: "(n.) 發文" }, { u: 7, w: "privacy", t: "(n.) 隱私" }, { u: 7, w: "sponsorship", t: "(n.) 贊助" }
];

let currentPool = [];
let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;

function generateWordList() {
    const listSection = document.getElementById('wordListSection');
    let html = "";
    const units = [...new Set(vocabulary.map(v => v.u))].sort((a, b) => a - b);
    units.forEach(u => {
        html += `<div class="unit-group">`;
        html += `<div class="unit-title">第 ${u} 單元</div>`;
        const unitWords = vocabulary.filter(v => v.u === u);
        unitWords.forEach(word => {
            html += `<div class="word-row">【<b>${word.w}</b> ${word.t}】</div>`;
        });
        html += `</div>`;
    });
    listSection.innerHTML = html;
}

function toggleWordList() {
    const listSection = document.getElementById('wordListSection');
    if (listSection.style.display === 'none') {
        listSection.style.display = 'block';
        if (listSection.innerHTML.trim() === "") {
            generateWordList();
        }
    } else {
        listSection.style.display = 'none';
    }
}

function toggleAllUnits(state) {
    const checkboxes = document.querySelectorAll('input[name="unit"]');
    checkboxes.forEach(cb => cb.checked = state);
}

function startTest() {
    const selectedUnits = Array.from(document.querySelectorAll('input[name="unit"]:checked')).map(cb => parseInt(cb.value));
    if (selectedUnits.length === 0) {
        alert("請至少勾選一個單元！");
        return;
    }
    currentPool = vocabulary.filter(v => selectedUnits.includes(v.u));
    currentPool.sort(() => Math.random() - 0.5);
    currentIndex = 0;
    correctCount = 0;
    wrongCount = 0;
    document.getElementById('setupSection').style.display = 'none';
    document.getElementById('quizSection').style.display = 'block';
    document.getElementById('resultSection').style.display = 'none';
    showQuestion();
}

function showQuestion() {
    if (currentIndex >= currentPool.length) {
        endTest();
        return;
    }
    updateStats();
    document.getElementById('wordType').innerText = currentPool[currentIndex].t;
    document.getElementById('userInput').value = "";
    document.getElementById('feedback').innerText = "";
    document.getElementById('feedback').className = "feedback";
    document.getElementById('submitBtn').innerText = "提交答案";
    document.getElementById('submitBtn').onclick = checkAnswer;
    playAudio();
    document.getElementById('userInput').focus();
}

function updateStats() {
    document.getElementById('progress').innerText = `進度: ${currentIndex + 1} / ${currentPool.length}`;
    document.getElementById('scoreDisplay').innerText = `正確: ${correctCount} | 錯誤: ${wrongCount}`;
}

function playAudio() {
    const msg = new SpeechSynthesisUtterance(currentPool[currentIndex].w);
    msg.lang = 'en-US';
    msg.rate = 0.9;
    window.speechSynthesis.speak(msg);
}

function checkAnswer() {
    const input = document.getElementById('userInput').value.trim().toLowerCase();
    const answer = currentPool[currentIndex].w.toLowerCase();
    const feedback = document.getElementById('feedback');
    if (input === answer) {
        feedback.innerText = "答對了！ ✨";
        feedback.className = "feedback correct";
        correctCount++;
    } else {
        feedback.innerText = `錯誤！答案是: ${currentPool[currentIndex].w}`;
        feedback.className = "feedback wrong";
        wrongCount++;
    }
    updateStats();
    document.getElementById('submitBtn').innerText = "下一題";
    document.getElementById('submitBtn').onclick = () => {
        currentIndex++;
        showQuestion();
    };
}

function endTest() {
    document.getElementById('quizSection').style.display = 'none';
    document.getElementById('resultSection').style.display = 'block';
    const totalAttempted = correctCount + wrongCount;
    const accuracy = totalAttempted === 0 ? 0 : Math.round((correctCount / totalAttempted) * 100);
    document.getElementById('finalScore').innerText = `正確率：${accuracy}%`;
    document.getElementById('scoreDetails').innerHTML = `
        <div class="result-item"><span>總作答數：</span><span>${totalAttempted} 題</span></div>
        <div class="result-item" style="color: green;"><span>答對題數：</span><span>${correctCount} 題</span></div>
        <div class="result-item" style="color: red;"><span>答錯題數：</span><span>${wrongCount} 題</span></div>
    `;
}

document.getElementById('userInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        const btn = document.getElementById('submitBtn');
        btn.click();
    }
});
</script>
